<div class="task-list">
    <div *ngIf="(filteredTasks$ | async)?.length === 0" class="empty-state">
        <div class="empty-icon">📝</div>
        <p>No tasks found. Time to add some!</p>
    </div>

    <div class="tasks-container">
        <app-task-item *ngFor="let task of filteredTasks$ | async; trackBy: trackById" [task]="task">
        </app-task-item>
    </div>
</div>
